name: Publish to npm

# Pushing a tag like v0.1.1 triggers this. The job builds the bundled
# tarball and runs `npm publish`, so you never have to publish from
# your laptop. The version in the tag must match package.json's
# `version` (npm enforces this).
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # OIDC: lets GitHub mint the token npm exchanges
                        # for short-lived publish credentials (Trusted
                        # Publishing). Still required even without
                        # --provenance.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      # Trusted Publishing needs npm CLI >= 11.5.1. Node 20 ships with
      # npm 10.x, which signs provenance fine but then 404s on the
      # actual publish PUT because it can't fetch the OIDC token. Bump
      # to latest npm before doing anything else.
      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest

      - name: Install
        run: npm ci

      # `prepublishOnly` runs typecheck + tests + build for us, so the
      # publish step doesn't need a separate `npm run build` here.
      # Auth comes from OIDC (Trusted Publishing on npmjs.com) — no
      # NPM_TOKEN secret stored anywhere.
      #
      # We deliberately do NOT pass --provenance: provenance attestations
      # require a *public* source repository, and ours is private. Trusted
      # Publishing itself works fine without it; we just lose the
      # cryptographic build-origin proof on the published tarball.
      - name: Publish
        run: npm publish --access public
