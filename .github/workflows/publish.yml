name: Publish to npm

# Pushing a tag like v0.1.1 triggers this. The job builds the bundled
# tarball and runs `npm publish`, so you never have to publish from
# your laptop. The version in the tag must match package.json's
# `version` (npm enforces this).
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # write — the GitHub Release step needs to
                        # create the release on the tag.
      id-token: write   # OIDC: lets GitHub mint the token npm exchanges
                        # for short-lived publish credentials (Trusted
                        # Publishing). Still required even without
                        # --provenance.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      # Trusted Publishing needs npm CLI >= 11.5.1. Node 20 ships with
      # npm 10.x, which signs provenance fine but then 404s on the
      # actual publish PUT because it can't fetch the OIDC token. Bump
      # to latest npm before doing anything else.
      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest

      - name: Install
        run: npm ci

      # `prepublishOnly` runs typecheck + tests + build for us, so the
      # publish step doesn't need a separate `npm run build` here.
      # Auth comes from OIDC (Trusted Publishing on npmjs.com) — no
      # NPM_TOKEN secret stored anywhere.
      #
      # We deliberately do NOT pass --provenance: provenance attestations
      # require a *public* source repository, and ours is private. Trusted
      # Publishing itself works fine without it; we just lose the
      # cryptographic build-origin proof on the published tarball.
      - name: Publish
        run: npm publish --access public

      # Create a GitHub Release on the tag so the repo's "Releases"
      # sidebar populates and downstream automations (release-bot
      # subscriptions, npmjs's GitHub link, etc.) light up. Notes
      # are auto-generated from PRs / commits since the previous
      # tag. Pulls the matching version section out of CHANGELOG.md
      # if one exists so the release page mirrors it.
      - name: Extract changelog section
        id: changelog
        run: |
          tag="${GITHUB_REF_NAME#v}"
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$tag" '
              $0 ~ "^## \\["ver"\\]" { capture = 1; next }
              capture && /^## \[/ { exit }
              capture { print }
            ' CHANGELOG.md > /tmp/release-notes.md
          fi
          if [ ! -s /tmp/release-notes.md ]; then
            echo "_See the [CHANGELOG](./CHANGELOG.md) for full release notes._" > /tmp/release-notes.md
          fi
          echo "path=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.changelog.outputs.path }}
          generate_release_notes: true
          draft: false
          prerelease: false
          make_latest: true
