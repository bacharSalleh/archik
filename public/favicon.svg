<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Three-node "A" — left stroke (cyan), right stroke (magenta), -->
  <!-- dashed cross-bar at the bottom. The dashed cross-bar is the   -->
  <!-- visual signature: nodes connected by dashed edges = archik.  -->
  <path d="M 16 6 L 6 24" stroke="#22d3ee" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M 16 6 L 26 24" stroke="#f472b6" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M 7.5 24 L 24.5 24" stroke="#67e8f9" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="2 2.5"/>
  <circle cx="16" cy="6" r="3.4" fill="#22d3ee" stroke="#0c1426" stroke-width="0.6"/>
  <circle cx="6" cy="24" r="3.4" fill="#67e8f9" stroke="#0c1426" stroke-width="0.6"/>
  <circle cx="26" cy="24" r="3.4" fill="#f472b6" stroke="#0c1426" stroke-width="0.6"/>
</svg>
