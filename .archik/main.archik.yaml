version: "1.0"
name: Archik
description: Archik's own architecture — eating our own dog food. The YAML you're looking at is what `archik dev` renders when run from the root of this repo.
nodes:
  - id: bin
    kind: function
    name: bin/archik.js
    description: Entry shim. If dist/cli/archik.mjs exists, spawns the bundled CLI with node; otherwise falls back to tsx + src/. Sets ARCHIK_PKG_ROOT so the CLI never has to guess where it lives.
    stack: Node ESM
    sourcePath: bin/archik.js
  - id: cli
    kind: module
    name: CLI
    description: Command dispatcher. Parses options, routes to the right handler.
    sourcePath: src/cli
  - id: cli-init
    kind: function
    name: init
    description: Scaffold the archik file (defaults to .archik/main.archik.yaml under the new convention, or architecture.archik.yaml if that already exists) and install the Claude skill (default).
    parentId: cli
    sourcePath: src/cli/commands/init.ts
  - id: cli-validate
    kind: function
    name: validate
    description: Zod-validate the YAML. Exits 1 on schema error — CI-friendly.
    parentId: cli
    sourcePath: src/cli/commands/validate.ts
  - id: cli-render
    kind: function
    name: render
    description: Headless ELK + React server-side render to a self-contained SVG file.
    parentId: cli
    sourcePath: src/cli/commands/render.ts
  - id: cli-dev
    kind: function
    name: dev / start / stop / status
    description: Lifecycle of the canvas server. Single-instance per YAML enforced by the daemon lock.
    parentId: cli
    sourcePath: src/cli/commands/dev.ts
  - id: cli-skill
    kind: function
    name: skill
    description: Copy SKILL.md into ./.claude/skills/archik/ (or ~/.claude/skills/archik/ with --user).
    parentId: cli
    sourcePath: src/cli/commands/skill.ts
  - id: cli-resolve-doc-path
    kind: function
    name: resolveDocPath
    description: Helper shared by every read-side CLI command. Finds the canonical archik file — prefers the legacy architecture.archik.yaml at root, falls back to the new .archik/main.archik.yaml. Throws when both exist so the user picks one.
    parentId: cli
    sourcePath: src/cli/resolveDocPath.ts
  - id: daemon
    kind: port
    name: Daemon Lock
    description: O_EXCL state file in $TMPDIR/archik-cli/<sha-of-doc-path>.json. Holds pid + URL + log path. dev / start / stop / status all share it. isAlive cross-checks `ps -o lstart=` against the recorded startedAt to defeat PID reuse.
  - id: dev-server
    kind: service
    name: Dev Server
    description: node:http server. Serves dist/ui/ statically and mounts the shared `handlers` module — root YAML, suggestion sidecar, accept, diff SVG, plus the per-file (/__archik/file, file-accept) and file-list (/__archik/files) endpoints that drive multi-file navigation. SSE on /__archik/events.
    stack: node:http
    sourcePath: src/server/devServer.ts
  - id: handlers
    kind: module
    name: HTTP Handlers
    description: Single source of truth for every dev-surface endpoint — handleYaml, handleSidecar, handleAccept, handleDiffSvg, handleArchikFile, handleArchikAccept, handleListFiles. Atomic tmp+rename on every write so a partial write never truncates the source of truth. Mounted by both `archik dev` (node:http) and the Vite dogfood plugin so the suggest workflow behaves identically in published mode and in-repo `npm run dev`.
    sourcePath: src/server/handlers.ts
  - id: vite-plugin
    kind: adapter
    name: Vite Plugin
    description: archikWatch — Vite dev plugin that mounts the shared `handlers` (root + per-file + list) and broadcasts archik:doc-changed / archik:suggestion-changed via Vite HMR. Watches the doc, sidecar, and the .archik/ folder so sub-file edits also fire live-reload.
    stack: Vite
  - id: file-watcher
    kind: worker
    name: YAML Watcher
    description: chokidar tail of the canonical YAML, its sidecar, and the project's .archik/ folder. Pushes archik:doc-changed / archik:suggestion-changed events to all SSE subscribers; sub-file edits flow through too.
    stack: chokidar
    sourcePath: src/server/devServer.ts
  - id: canvas
    kind: page
    name: Canvas
    description: React app. Stateless projection of the YAML — every edit round-trips through PUT, so the file is always the truth. Holds a navigation stack (drill-down via a node's `archikFile`, breadcrumbs to walk back) and toggles an in-canvas diff overlay for pending suggestions instead of opening a separate tab.
    stack: React + Vite (build-time only)
    sourcePath: src/render/Canvas.tsx
  - id: inspector
    kind: module
    name: Inspectors
    description: Toolbar, NodeInspector, EdgeInspector, Legend, KindPicker, AddNodeForm, ExportMenu — every UI surface that mutates the document. Locked while a suggestion is being reviewed so the merged-doc view stays read-only.
    parentId: canvas
    sourcePath: src/ui
  - id: live-reload
    kind: adapter
    name: Live Reload
    description: EventSource client subscribed to /__archik/events. Falls back to Vite HMR for in-repo `npm run dev`.
    parentId: canvas
  - id: breadcrumbs
    kind: module
    name: Breadcrumbs
    description: Drill-down navigation bar at the top of the canvas. Walks the file stack left-to-right; each crumb except the last pops back to that depth. Hidden when the user is at the root file. Renders a suggestion dot next to any crumb whose file has a pending sidecar.
    parentId: canvas
    sourcePath: src/ui/Breadcrumbs.tsx
  - id: file-switcher
    kind: module
    name: File Switcher
    description: Dropdown listing every archik file under the project root (root + every .archik/*.archik.yaml). Selecting a peer file resets the navigation stack so the user lands at its root. Shows an accent dot next to files with a pending suggestion sidecar; hidden when the project only has one file.
    parentId: canvas
    sourcePath: src/ui/FileSwitcher.tsx
  - id: domain
    kind: module
    name: Domain
    description: Pure schema, validation, taxonomy, command operations. No React, no ELK, no I/O — safe to import from anywhere.
    sourcePath: src/domain
  - id: schema
    kind: interface
    name: Schema
    description: Zod schemas + TypeScript types. The single source of truth for what counts as a valid Archik document. superRefine enforces cross-references — unique ids, edges land on real nodes, no self-loops, no parentId cycles, and the multi-file constraints (archikFile must be a relative .archik.yaml path with no ..; cross-file edges have at most one of fromFile / toFile and the local endpoint resolves locally).
    parentId: domain
  - id: commands
    kind: function
    name: Commands
    description: Pure functions — addNode, removeEdge, updateNode, etc. Drive undo/redo via a command history.
    parentId: domain
    sourcePath: src/domain/commands.ts
  - id: taxonomy
    kind: function
    name: Taxonomy
    description: 27 node kinds (route added in v0.5.0), 17 relationships, plus per-kind icon and palette metadata.
    parentId: domain
    sourcePath: src/domain/taxonomy.ts
  - id: layout
    kind: service
    name: Layout Engine
    description: ELK adapter behind a LayoutEngine interface. Computes positions, edge routes, container padding, and offsets edges by their LCA so coords are absolute.
    stack: ELK.js
    sourcePath: src/layout
  - id: renderer
    kind: service
    name: SVG Renderer
    description: Per-shape components (Service, Cache, Queue, Frontend, Container, etc). Theme-aware. Same code path used by the canvas and headless `archik render`.
    sourcePath: src/render
  - id: diff-overlay
    kind: module
    name: Diff Overlay
    description: Diff overlay primitives (NodeDiffFrames, EdgeDiffOverlays, RemovedNodeDimmer) layered on top of the regular DiagramSvg when a suggestion is being reviewed. Same primitives feed the standalone DiffSvg used by `archik diff --out`. Lives in its own module to avoid a circular import between DiagramSvg and DiffSvg.
    parentId: renderer
    sourcePath: src/render/diffOverlay.tsx
  - id: io
    kind: module
    name: I/O
    description: YAML/JSON parsers (Zod-backed), exporters (markdown, json, yaml), browser fetch/save adapters.
    sourcePath: src/io
  - id: skill
    kind: prompt
    name: Claude Skill
    description: SKILL.md — the schema, the 3-rule protocol (read before answering, propose updates, validate after every edit), and the 27-kind taxonomy. Installed under .claude/skills/archik/.
  - id: claude-code
    kind: agent
    name: Claude Code
    description: AI editor. Reads the skill at session start, edits the YAML alongside code changes, runs `archik validate` after every save.
  - id: elk
    kind: external
    name: ELK
    description: Eclipse Layout Kernel. Hierarchical / layered placement and orthogonal edge routing.
  - id: npm
    kind: external
    name: npm registry
    description: Hosts the archik tarball at registry.npmjs.org/archik. Trusted Publishing via OIDC — no NPM_TOKEN stored anywhere.
  - id: github-actions
    kind: external
    name: GitHub Actions
    description: Builds + publishes on every v*.*.* tag push. Configured as a Trusted Publisher on npmjs.com/package/archik.
edges:
  - id: bin-cli
    from: bin
    to: cli
    relationship: invokes
    label: spawn (dist or tsx)
  - id: init-skill
    from: cli-init
    to: cli-skill
    relationship: invokes
    label: default
  - id: validate-domain
    from: cli-validate
    to: schema
    relationship: uses
  - id: render-layout
    from: cli-render
    to: layout
    relationship: uses
  - id: render-renderer
    from: cli-render
    to: renderer
    relationship: uses
  - id: render-io
    from: cli-render
    to: io
    relationship: uses
  - id: dev-server-spawn
    from: cli-dev
    to: dev-server
    relationship: invokes
  - id: dev-daemon
    from: cli-dev
    to: daemon
    relationship: uses
    label: lock state
  - id: dev-resolve-path
    from: cli-dev
    to: cli-resolve-doc-path
    relationship: uses
  - id: validate-resolve-path
    from: cli-validate
    to: cli-resolve-doc-path
    relationship: uses
  - id: render-resolve-path
    from: cli-render
    to: cli-resolve-doc-path
    relationship: uses
  - id: init-resolve-path
    from: cli-init
    to: cli-resolve-doc-path
    relationship: uses
    label: resolveInitTarget
  - id: server-handlers
    from: dev-server
    to: handlers
    relationship: uses
    label: mount routes
  - id: vite-handlers
    from: vite-plugin
    to: handlers
    relationship: uses
    label: mount routes
  - id: server-watcher
    from: dev-server
    to: file-watcher
    relationship: invokes
  - id: watcher-livereload
    from: file-watcher
    to: live-reload
    relationship: publishes
    label: SSE
  - id: server-canvas
    from: dev-server
    to: canvas
    relationship: routes_to
    label: GET dist/ui
  - id: canvas-yaml
    from: canvas
    to: dev-server
    relationship: http_call
    label: GET / PUT YAML + sidecar + files
  - id: canvas-domain
    from: canvas
    to: schema
    relationship: uses
  - id: canvas-layout
    from: canvas
    to: layout
    relationship: invokes
  - id: canvas-renderer
    from: canvas
    to: renderer
    relationship: uses
  - id: inspector-commands
    from: inspector
    to: commands
    relationship: invokes
    label: edits
  - id: layout-elk
    from: layout
    to: elk
    relationship: invokes
  - id: layout-domain
    from: layout
    to: schema
    relationship: depends_on
  - id: renderer-taxonomy
    from: renderer
    to: taxonomy
    relationship: depends_on
  - id: claude-skill
    from: claude-code
    to: skill
    relationship: uses
    label: protocol
  - id: claude-yaml
    from: claude-code
    to: io
    relationship: writes
    label: edit YAML
  - id: claude-validate
    from: claude-code
    to: cli-validate
    relationship: invokes
    label: after every edit
  - id: gha-publish
    from: github-actions
    to: npm
    relationship: publishes
    label: OIDC, on tag
