<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" width="640" height="200" fill="none" role="img" aria-label="archik">
  <!-- Logo: same three-node A, scaled to fit the 200×200 left tile. -->
  <g transform="translate(20, 20)" stroke-linecap="round">
    <path d="M 80 24 L 24 144" stroke="#22d3ee" stroke-width="11"/>
    <path d="M 80 24 L 136 144" stroke="#f472b6" stroke-width="11"/>
    <path d="M 36 144 L 124 144" stroke="#67e8f9" stroke-width="9" stroke-dasharray="11 11"/>
  </g>
  <g transform="translate(20, 20)" stroke="#0c1426" stroke-width="1.6">
    <circle cx="80" cy="24" r="17" fill="#22d3ee"/>
    <circle cx="24" cy="144" r="17" fill="#67e8f9"/>
    <circle cx="136" cy="144" r="17" fill="#f472b6"/>
  </g>

  <!-- Wordmark: lowercase "archik", weight 700, slight letter -->
  <!-- spacing for a confident technical feel. currentColor so  -->
  <!-- it adapts to whatever surface the SVG is dropped on.     -->
  <text x="220" y="128"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="120"
        font-weight="700"
        letter-spacing="-3"
        fill="currentColor">archik</text>
</svg>
