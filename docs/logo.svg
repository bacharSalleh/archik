<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" fill="none" role="img" aria-label="archik">
  <!-- Subtle radial glow behind the apex node so the logo has -->
  <!-- presence on dark backgrounds. Hidden by the rounded rect -->
  <!-- on light themes too — opacity is low. -->
  <defs>
    <radialGradient id="glow" cx="0.5" cy="0.32" r="0.6">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="240" height="240" rx="48" fill="url(#glow)"/>

  <!-- Three-node "A" — same DNA as the favicon, scaled up with -->
  <!-- room for slightly thicker strokes and crisper node halos.  -->
  <g stroke-linecap="round">
    <path d="M 120 56 L 56 188" stroke="#22d3ee" stroke-width="14"/>
    <path d="M 120 56 L 184 188" stroke="#f472b6" stroke-width="14"/>
    <path d="M 70 188 L 170 188" stroke="#67e8f9" stroke-width="11" stroke-dasharray="14 14"/>
  </g>

  <!-- Nodes: bright fill + thin dark stroke for crispness on -->
  <!-- both light and dark backgrounds.                       -->
  <g stroke="#0c1426" stroke-width="2">
    <circle cx="120" cy="56" r="22" fill="#22d3ee"/>
    <circle cx="56" cy="188" r="22" fill="#67e8f9"/>
    <circle cx="184" cy="188" r="22" fill="#f472b6"/>
  </g>
</svg>
